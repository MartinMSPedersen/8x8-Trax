<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Trax 8x8</title>
<link rel="icon" type="image/svg+xml" href="icon.svg?v=2026-07-21-rust113-2913671e">
<link rel="icon" type="image/png" href="favicon.png?v=2026-07-21-rust113-2913671e">
<link rel="stylesheet" href="style.css?v=2026-07-21-rust113-2913671e">
</head>
<body>
<header>
  <button id="themebtn" type="button" title="Switch day/night mode" aria-label="Switch day/night mode">&#127769;</button>
  <h1>Trax 8&times;8</h1>
  <p class="sub">
    <a href="https://en.wikipedia.org/wiki/Trax_(board_game)" target="_blank" rel="noopener">Rules and notation at Wikipedia</a>
  </p>
</header>

<main>
  <section id="boardwrap">
    <div id="board" aria-label="Trax board"></div>
    <div id="histnav">
      <button id="histback" title="View previous position (display only)">&#9664;</button>
      <span id="histpos"></span>
      <button id="histfwd" title="View next position">&#9654;</button>
    </div>
    <div id="status">Loading engine&hellip;</div>
    <div id="hint">Click an empty cell to cycle candidate tiles; Commit (or type a move) to play.</div>
    <div id="entry">
      <input type="text" id="movebox" placeholder="type a move, e.g. B1\ or @0+" autocomplete="off" spellcheck="false">
      <button id="commitbtn" disabled>Commit</button>
      <span id="moveerr" role="alert"></span>
    </div>
  </section>

  <aside id="controls">
    <fieldset>
      <legend>Mode</legend>
      <label><input type="radio" name="mode" value="mb" checked> Machine plays Black</label>
      <label><input type="radio" name="mode" value="mw"> Machine plays White</label>
      <label><input type="radio" name="mode" value="mm"> Two Machines</label>
      <label><input type="radio" name="mode" value="hh"> Human versus Human</label>
    </fieldset>

    <fieldset>
      <legend>Engine strength</legend>
      <select id="strength">
        <option value="2000">Easy (2 seconds)</option>
        <option value="5000" selected>Medium (5 seconds)</option>
        <option value="20000">Hard (20 seconds)</option>
        <option value="40000">Expert (40 seconds)</option>
        <option value="90000">World Champion (90 seconds)</option>
      </select>
    </fieldset>

    <fieldset>
      <legend>Variant</legend>
      <select id="variant">
        <option value="8x8" selected>Last player loses</option>
        <option value="8x8-draw">Draw</option>
      </select>
    </fieldset>

    <fieldset>
      <legend>Game</legend>
      <div class="btnrow">
        <button id="newbtn">New game</button>
        <button id="savebtn">Save game</button>
        <button id="loadbtn">Load game</button>
        <input type="file" id="loadfile" accept=".trx,.txt" hidden>
      </div>
    </fieldset>

    <fieldset>
      <legend>Options</legend>
      <label><input type="checkbox" id="optforced" checked> Show forced moves</label>
      <label><input type="checkbox" id="optponder"> Think on my time</label> <span id="ponderstatus" class="pstat"></span>
      <label><input type="checkbox" id="optvary" checked> Vary engine play</label>
      <label><input type="checkbox" id="optoutput"> Show engine output</label>
    </fieldset>

    <fieldset>
      <legend>Tile size</legend>
      <select id="tilesize">
        <option value="small">Small (40px)</option>
        <option value="medium" selected>Medium (60px)</option>
        <option value="large">Large (80px)</option>
      </select>
    </fieldset>

    <fieldset>
      <legend>Moves</legend>
      <div id="history" class="mono"></div>
    </fieldset>

    <fieldset id="enginepane" hidden>
      <legend>Engine output</legend>
      <pre id="enginelog" class="mono"></pre>
    </fieldset>
  </aside>
</main>

<footer class="dim">
  Knowledge: <span id="knowledge">&hellip;</span>
</footer>

<script>window.CACHEBUST="2026-07-21-rust113-2913671e";</script>
<script src="app.js?v=2026-07-21-rust113-2913671e"></script>
</body>
</html>
